<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axoft - Каталог и Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-container">
            <a href="#" class="logo">Axoft</a>
            
            <input type="checkbox" id="menu-toggle" class="menu-toggle">
            <label for="menu-toggle" class="hamburger">☰</label>
            
            <nav class="nav-menu">
                <ul class="nav-list">
                    <li><a href="#" class="nav-link active">Главная</a></li>
                    <li><a href="#" class="nav-link">О нас</a></li>
                    <li><a href="#" class="nav-link">Услуги</a></li>
                    <li><a href="#" class="nav-link">Портфолио</a></li>
                    <li><a href="#" class="nav-link">Контакты</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="catalog-section">
            <div class="container">
                <h2 class="section-title">Каталог товаров</h2>
                <div class="catalog-grid" id="catalogGrid"></div>
            </div>
        </section>

        <section class="login-section">
            <div class="container">
                <div class="form-wrapper">
                    <form class="login-form" id="loginForm">
                        <h2 class="form-title">Вход в аккаунт</h2>
                        
                        <div class="form-group">
                            <input type="email" id="email" class="form-input" required>
                            <label for="email" class="form-label">Email</label>
                            <div class="error-message" id="emailError"></div>
                        </div>
                        
                        <div class="form-group">
                            <input type="password" id="password" class="form-input" required>
                            <label for="password" class="form-label">Пароль</label>
                            <div class="error-message" id="passwordError"></div>
                        </div>
                        
                        <button type="submit" class="submit-btn" id="submitBtn">
                            <span class="btn-text">Войти</span>
                            <span class="spinner hidden"></span>
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
